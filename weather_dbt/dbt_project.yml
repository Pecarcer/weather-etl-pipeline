name: "weather_dbt"
version: "1.0.0"
config-version: 2

profile: "weather_dbt"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  weather_dbt:
    staging:
      +schema: STAGING
      +materialized: view # staging como vistas — no ocupan espacio
    intermediate:
      +schema: INTERMEDIATE
      +materialized: view
    marts:
      +schema: ANALYTICS # marts en el schema ANALYTICS que ya tienes
      +materialized: table # marts como tablas — son el resultado final
